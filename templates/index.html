<!DOCTYPE html>
<html>

<head>

<title>Network Intrusion Detection Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, sans-serif;
    background:#f4f7fb;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:40px;
    color:#222;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-bottom:40px;
}

.card{

    border-radius:18px;
    padding:25px;
    text-align:center;

    color:white;

    box-shadow:0px 5px 20px rgba(0,0,0,0.15);

    transition:0.3s;
}

.card:hover{

    transform:translateY(-6px);
}

.accuracy{
    background:linear-gradient(135deg,#1abc9c,#16a085);
}

.precision{
    background:linear-gradient(135deg,#3498db,#2980b9);
}

.recall{
    background:linear-gradient(135deg,#9b59b6,#8e44ad);
}

.f1{
    background:linear-gradient(135deg,#e67e22,#d35400);
}

.metric-title{

    font-size:22px;
    font-weight:600;
}

.metric-value{

    margin-top:15px;
    font-size:42px;
    font-weight:bold;
}

.section{

    background:white;

    padding:25px;

    margin-top:35px;

    border-radius:15px;

    box-shadow:0px 3px 10px rgba(0,0,0,0.1);
}

.section h2{

    text-align:center;

    margin-bottom:20px;

    color:#333;
}

img{

    width:100%;

    max-width:1000px;

    display:block;

    margin:auto;

    border-radius:10px;
}

.footer{

    text-align:center;

    margin-top:40px;

    color:#666;
}

</style>

</head>

<body>

<h1>🛜 Network Intrusion Detection using ANN</h1>

<div class="container">

    <div class="card accuracy">
        <div class="metric-title">Accuracy</div>
        <div class="metric-value">{{ accuracy }}</div>
    </div>

    <div class="card precision">
        <div class="metric-title">Precision</div>
        <div class="metric-value">{{ precision }}</div>
    </div>

    <div class="card recall">
        <div class="metric-title">Recall</div>
        <div class="metric-value">{{ recall }}</div>
    </div>

    <div class="card f1">
        <div class="metric-title">F1 Score</div>
        <div class="metric-value">{{ f1 }}</div>
    </div>

</div>

<div class="section">

    <h2>Confusion Matrix</h2>

    <img src="{{ url_for('static', filename='confusion_matrix.png') }}">

</div>

<div class="section">

    <h2>Training Accuracy</h2>

    <img src="{{ url_for('static', filename='training_accuracy.png') }}">

</div>

<div class="section">

    <h2>Training Loss</h2>

    <img src="{{ url_for('static', filename='training_loss.png') }}">

</div>

<div class="footer">

    Powered by TensorFlow • Flask • NSL-KDD Dataset

</div>

</body>

</html>
